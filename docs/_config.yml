title: "riscv-5"
tagline: "A 5-stage pipelined RV32I core in SystemVerilog"
author: Charlie Shields
description: >
  A 5-stage pipelined RV32I core in SystemVerilog. Synthesized on a
  Xilinx Zynq-7000 (PYNQ-Z2), verified against the RISCOF compliance
  suite (482 RV32I tests, 100% pass against Spike).
# Production deploy URL. Used by jekyll-seo-tag and jekyll-sitemap for
# canonical URLs, og:url, og:image, twitter:image, and sitemap.xml.
# Default below assumes GitHub Pages project deploy at
# https://cshieldsce.github.io/riscv-5/. If you use a custom domain
# (CNAME), set url to the domain and baseurl to "".
url: "https://cshieldsce.github.io"
baseurl: "/riscv-5"
permalink: pretty

# Single source of truth for every number that appears on the site.
# Fill these in once; the home page, verification page, and FPGA
# page all read from here. Use TBD where a number isn't measured yet.
#
# fmax derivation (do this once you fill in wns_ns):
#   fmax_mhz = 1000 / (clock_target_period_ns - wns_ns)
# Don't hardcode the period; express it as the variable above.
# Example: period 100 ns, WNS 12.5 ns => fmax = 1000 / 87.5 ~= 11.43 MHz.
results:
  fpga_target: "Xilinx Zynq-7000 (PYNQ-Z2)"
  toolchain: "Vivado 2025.2"
  clock_target_mhz: 10
  clock_target_period_ns: 100
  wns_ns: "TBD"        # Worst negative slack from Vivado timing report
  fmax_mhz: "TBD"      # Derived: 1000 / (clock_target_period_ns - wns_ns)
  lut: 1972
  lut_pct: "3.71%"
  ff: 3326
  ff_pct: "3.13%"
  bram: 7
  bram_pct: "5.00%"
  # Split into _total / _pass so the strip can honestly show a partial
  # pass if RISCOF ever regresses.
  riscof_rv32i_total: 482
  riscof_rv32i_pass: 482
  riscof_regression_total: 120
  riscof_regression_pass: 120
  riscof_golden_model: "Spike"

# OG image for social link previews; picked up by jekyll-seo-tag
# as og:image and twitter:image.
image: /images/pipeline_complete.svg

# Top nav (5 items, single source of truth).
nav:
  - { title: Home,         url: "/" }
  - { title: Architecture, url: "/architecture/" }
  - { title: Verification, url: "/verification/" }
  - { title: FPGA,         url: "/fpga/" }
  - { title: Setup,        url: "/setup/" }

# Left sidebar shown only when page.sidebar == "architecture".
arch_sidebar:
  - { title: "Overview",             url: "/architecture/" }
  - { title: "Pipeline Stages",      url: "/architecture/stages/" }
  - { title: "Hazards & Forwarding", url: "/architecture/hazards/" }

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - "*.drawio"
  - architecture/*.drawio
